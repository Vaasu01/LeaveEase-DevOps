# ─────────────────────────────────────────────────────────────
# docker-compose.yml  –  LeaveEase full-stack deployment
# ─────────────────────────────────────────────────────────────
#
# LOCAL DEV (first time or after Dockerfile change):
#   docker-compose up --build
#
# NORMAL START (uses existing image):
#   docker-compose up -d
#
# JENKINS VERSIONED DEPLOY (Jenkins sets APP_IMAGE automatically):
#   set APP_IMAGE=leaveease-app:42 && docker-compose up -d app
#
# STOP (preserves DB data):
#   docker-compose stop app
#
# FULL WIPE including DB:
#   docker-compose down -v
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── 1. MySQL Database ──────────────────────────────────────
  # NEVER stopped by Jenkins — data volume is always preserved.
  mysql:
    image: mysql:8.0
    container_name: leaveease_mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: vaasu
      MYSQL_DATABASE: leaveease

    ports:
      - "3307:3306"   # 3307 on host avoids clash with local MySQL

    volumes:
      - mysql_data:/var/lib/mysql   # named volume — survives container restarts

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pvaasu"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── 2. Node.js Application ────────────────────────────────
  # APP_IMAGE is set by Jenkins to leaveease-app:BUILD_NUMBER.
  # Falls back to leaveease-app:latest for local manual runs.
  app:
    image: ${APP_IMAGE:-leaveease-app:latest}

    container_name: leaveease_app
    restart: unless-stopped

    environment:
      DB_HOST:     mysql
      DB_USER:     root
      DB_PASSWORD: vaasu
      DB_NAME:     leaveease
      PORT:        3000
      NODE_ENV:    production

    ports:
      - "3000:3000"

    depends_on:
      mysql:
        condition: service_healthy

# ── Named volume — data persists across all restarts ─────────
volumes:
  mysql_data:
